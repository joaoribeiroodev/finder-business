services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4}
      APP_PASSWORD: ${APP_PASSWORD:-}
      SCRAPER_MAX_PLACES: ${SCRAPER_MAX_PLACES:-30}
      SCRAPER_TIMEOUT_MS: ${SCRAPER_TIMEOUT_MS:-60000}
      RATE_LIMIT_SCRAPER: ${RATE_LIMIT_SCRAPER:-5}
      RATE_LIMIT_OPENAI: ${RATE_LIMIT_OPENAI:-30}
      PLAYWRIGHT_CHROMIUM_SANDBOX: "0"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
